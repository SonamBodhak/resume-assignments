<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Builder</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="script.js" defer></script>
</head>
<body>

    <resume-builder id="resume"></resume-builder>

    <script>
        fetch("data.json")
            .then(res => res.json())
            .then(json => {
                const resume = document.getElementById("resume");
                resume.setAttribute("data", JSON.stringify(json.data));
                resume.setAttribute("config", JSON.stringify(json.config));
            });
    </script>

</body>
</html>
